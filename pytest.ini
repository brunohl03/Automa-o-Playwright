[pytest]
addopts = --alluredir=allure-results --reruns 2 -v -n 4 

"""
Este comando define opções globais do pytest para todos os testes do projeto.

Explicação detalhada de cada opção:
```bash
--alluredir=allure-results
```
    Define o diretório onde os resultados do teste serão salvos para o Allure.
    Esses arquivos serão usados para gerar o relatório interativo.
```bash
--reruns 2
```
    Se algum teste falhar, ele será reexecutado até 2 vezes automaticamente.
    Isso ajuda a reduzir falsos negativos causados por instabilidades temporárias.
```bash
-v
```
    Ativa o modo verbose, mostrando informações detalhadas de cada teste
    durante a execução no terminal.
```bash
-n 4
```
    Executa os testes em paralelo usando 4 threads/processos (pytest-xdist),
    acelerando a execução de múltiplos testes.

Resumo:
Essas opções juntas permitem gerar relatórios, reexecutar testes instáveis,
ver logs detalhados e acelerar a execução de testes em paralelo.
"""
