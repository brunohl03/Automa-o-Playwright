name: Demo QA automation tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Escolha o navegador"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: 🐍 Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      env:
        BROWSER: ${{ github.event.inputs.browser }}

    - name: 🌐 Install Playwright browsers
      run: python -m playwright install --with-deps
      env:
        BROWSER: ${{ github.event.inputs.browser }}

    - name: 🧪 Run tests
      id: run_tests
      run: |
        pytest -v --tb=short --maxfail=0 --junitxml=test-results/results.xml
      continue-on-error: true
      env:
        BROWSER: ${{ github.event.inputs.browser }}

    - name: 📝 Test summary
      run: |
        if [ -f test-results/results.xml ]; then
          PASSED=$(grep -o 'status="passed"' test-results/results.xml | wc -l)
          FAILED=$(grep -o 'status="failed"' test-results/results.xml | wc -l)
          TOTAL=$((PASSED + FAILED))
          echo "=========================================="
          echo "🧪 Test Summary"
          echo "✅ Passed: $PASSED"
          echo "❌ Failed: $FAILED"
          echo "🕒 Total tests: $TOTAL"
          echo "=========================================="
        else
          echo "⚠️  Não foi possível gerar o resumo dos testes."
        fi

    - name: 📁 Upload Playwright traces
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-traces
        path: test-results/