name: Demo QA automation tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Escolha o navegador"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: 🐍 Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      env:
        BROWSER: ${{ github.event.inputs.browser }}

    - name: 🌐 Install Playwright browsers
      run: python -m playwright install --with-deps
      env:
        BROWSER: ${{ github.event.inputs.browser }}

    - name: 🧪 Run tests and generate summary
      id: run_tests
      run: |
        # Roda os testes e salva o log
        pytest -v --tb=short --maxfail=0 | tee test.log

        # Conta quantos passaram e quantos falharam
        PASSED=$(grep -c "PASSED" test.log || true)
        FAILED=$(grep -c "FAILED" test.log || true)
        TOTAL=$((PASSED + FAILED))

        # Mostra resumo bonito
        echo "=========================================="
        echo "🧪 Test Summary"
        echo "✅ Passed: $PASSED"
        echo "❌ Failed: $FAILED"
        echo "🕒 Total tests: $TOTAL"
        echo "=========================================="
      continue-on-error: true
      env:
        BROWSER: ${{ github.event.inputs.browser }}

    - name: 📁 Upload Playwright traces
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-traces
        path: test-results/